profile: precision
rules_file: rules/default_rules.yaml

scoring:
  score_threshold: 64
  label_threshold: 64
  strong_chain_threshold: 60
  weak_signal_score_cap: 32
  require_chain_for_label1: true
  min_strong_categories_for_label1: 2
  terminal_rule_ids:
    - R005
  llm_min_score: 4
  llm_correction_min_confidence: 0.85
  risk_levels:
    low: 10
    medium: 38
    high: 64
    critical: 82

rules:
  profile_behavior:
    credential_shell_requires_same_event: true
    credential_exfil_requires_command: true
    sensitive_chain_requires_command: true
    include_network_observed_as_strong_category: false
  weights:
    combo_sensitive_archive_network: 64
    combo_sensitive_upload: 60
    combo_sensitive_network_post: 60
    combo_cleanup_plus_sensitive: 58
    combo_privilege_followup: 60
    combo_credential_shell: 64
    combo_privilege_shell_network_context: 58
    combo_powershell_network: 62
    combo_persistence_command: 60
    combo_lateral_credential: 68

llm:
  enabled: false
  mode: borderline
  base_url: http://127.0.0.1:8000/v1
  model: qwen36-27b
  timeout: 180
  timeout_seconds: 180
  min_score: 4
  max_score: 80
  max_cases: 0
  cache: true
  cache_path: data/work/llm_cache.jsonl
  borderline_window: 10
  max_evidence: 8
  allow_external_api: false

pcap_enabled: true
pcap_max_packets: 50000
evidence_excerpt_max_chars: 240
default_label_on_error: 0

pcap:
  enabled: true
  max_packets: 50000

output:
  evidence_excerpt_chars: 240
  evidence_excerpt_max_chars: 240
