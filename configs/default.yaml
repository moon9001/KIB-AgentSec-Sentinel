rules_file: rules/default_rules.yaml

scoring:
  label_threshold: 45
  max_score: 100
  risk_levels:
    low: 15
    medium: 35
    high: 55
    critical: 75

llm:
  enabled: false
  base_url: http://127.0.0.1:8000/v1
  model: qwen36-27b
  timeout_seconds: 8
  min_score: 35
  max_evidence: 8
  allow_external_api: false

pcap:
  max_packets: 50000
  suspicious_external_threshold: 1
  suspicious_connection_threshold: 200
  suspicious_nonstandard_ports:
    - 4444
    - 5555
    - 6667
    - 8081
    - 9001
    - 1337

output:
  evidence_excerpt_chars: 240

